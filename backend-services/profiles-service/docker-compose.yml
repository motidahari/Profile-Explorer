services:
  postgres:
    image: postgres:16-alpine
    container_name: profiles-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: profiles
      POSTGRES_PASSWORD: profiles
      POSTGRES_DB: profiles
    ports:
      - '5432:5432'
    volumes:
      - profiles-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U profiles']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  profiles-pgdata:
